<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohammad & Hadis Wedding</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #2a1f1f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Montserrat', sans-serif;
  }
  .card {
    background: #3b2f2f;
    border-radius: 20px;
    padding: 3rem 2.5rem;
    text-align: center;
    max-width: 480px;
    width: 90%;
    border: 1px solid rgba(196,168,130,0.2);
  }
  .wedding-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: #e8d5b0;
    font-size: 2.5rem;
    letter-spacing: 1px;
    margin-bottom: 0.25rem;
  }
  .names {
    color: #c4a882;
    font-size: 0.75rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .divider {
    width: 60px;
    height: 1px;
    background: #c4a882;
    margin: 1rem auto 2rem;
    opacity: 0.5;
  }
  .timer-grid {
    display: flex;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }
  .timer-box {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(196,168,130,0.25);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    min-width: 85px;
  }
  .timer-num {
    font-size: 2.8rem;
    font-weight: 600;
    color: #e8d5b0;
    line-height: 1;
    display: block;
  }
  .timer-label {
    font-size: 0.6rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c4a882;
    margin-top: 8px;
    display: block;
  }
  .date-text {
    color: #c4a882;
    font-size: 0.8rem;
    letter-spacing: 2px;
    opacity: 0.7;
    margin-top: 1rem;
  }
  .address-text {
    color: #e8d5b0;
    font-size: 0.85rem;
    letter-spacing: 1px;
    margin-top: 1rem;
  }
  .address-sub {
    color: #c4a882;
    font-size: 0.75rem;
    letter-spacing: 1px;
    margin-top: 4px;
    opacity: 0.8;
  }
  .done-msg {
    color: #e8d5b0;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.5rem;
    display: none;
  }
</style>
</head>
<body>
<div class="card">
  <p class="wedding-title">Wedding</p>
  <p class="names">Mohammad &amp; Hadis</p>
  <div class="divider"></div>
  <div class="timer-grid" id="timer-grid">
    <div class="timer-box">
      <span class="timer-num" id="days">--</span>
      <span class="timer-label">روز</span>
    </div>
    <div class="timer-box">
      <span class="timer-num" id="hours">--</span>
      <span class="timer-label">ساعت</span>
    </div>
    <div class="timer-box">
      <span class="timer-num" id="mins">--</span>
      <span class="timer-label">دقیقه</span>
    </div>
    <div class="timer-box">
      <span class="timer-num" id="secs">--</span>
      <span class="timer-label">ثانیه</span>
    </div>
  </div>
  <p class="done-msg" id="done-msg">مبارک باشد 🌹</p>
  <p class="date-text">۱۴۰۵ / ۰۵ / ۲۵ &nbsp;|&nbsp; ساعت ۱۸:۰۰</p>
  <div class="divider" style="margin-top:1.5rem;"></div>
  <p class="address-text">📍 مشهد &mdash; پیامبر اعظم ۱۰۵</p>
  <p class="address-sub">بین گلستان ۱ و ۳</p>
</div>

<script>
  const weddingDate = new Date(2026, 7, 16, 18, 0, 0);
  function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }
  function tick() {
    const diff = weddingDate - new Date();
    if (diff <= 0) {
      document.getElementById('timer-grid').style.display = 'none';
      document.getElementById('done-msg').style.display = 'block';
      return;
    }
    document.getElementById('days').textContent  = pad(diff / 86400000);
    document.getElementById('hours').textContent = pad((diff % 86400000) / 3600000);
    document.getElementById('mins').textContent  = pad((diff % 3600000) / 60000);
    document.getElementById('secs').textContent  = pad((diff % 60000) / 1000);
  }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
